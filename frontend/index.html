<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="color-scheme" content="light dark">
  <meta name="description" content="GoHTTP File Server - Browse, upload, and manage files over HTTP">
  <title>Go HTTP File Server</title>
  <!--
    Inter — UI font (system-quality body copy that scales beautifully).
    JetBrains Mono — code/data font (tabular nums, monospaced digits).
    Preconnect for snappy first paint; async stylesheet so font load
    never blocks the JS bundle from kicking in.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    media="print"
    onload="this.media='all'"
  >
  <noscript>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    >
  </noscript>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>

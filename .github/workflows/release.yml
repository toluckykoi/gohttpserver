name: release

# @Author      ：幸运锦鲤
# @Description : 打 tag 时自动构建前端 + 多平台 Go 二进制，并发布 GitHub Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --force --tags

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Compute version info
        id: ver
        run: |
          VERSION=$(git describe --abbrev=0 --tags 2>/dev/null || cat VERSION 2>/dev/null || echo "v0.0.0")
          GITCOMMIT=$(git rev-parse HEAD 2>/dev/null || echo "unknown")
          BUILDTIME=$(date +%Y/%m/%d-%H:%M:%S)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "gitcommit=$GITCOMMIT" >> $GITHUB_OUTPUT
          echo "buildtime=$BUILDTIME" >> $GITHUB_OUTPUT
          echo "VER: $VERSION"

          # 从 CHANGELOG.md 提取对应版本段落作为 Release 说明
          CHANGELOG_BODY=""
          if [ -f CHANGELOG.md ]; then
            CHANGELOG_BODY=$(awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\]" { flag=1; next }
              /^## \[/ { flag=0 }
              flag { print }
            ' CHANGELOG.md)
          fi
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG_BODY"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build Go binaries
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          GITCOMMIT: ${{ steps.ver.outputs.gitcommit }}
          BUILDTIME: ${{ steps.ver.outputs.buildtime }}
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X main.VERSION=$VERSION -X main.BUILDTIME=$BUILDTIME -X main.GITCOMMIT=$GITCOMMIT"

          build() {
            local goos=$1 goarch=$2 name=$3
            echo "  -> $goos/$goarch ..."
            CGO_ENABLED=0 GOOS=$goos GOARCH=$goarch \
              go build -trimpath -ldflags "$LDFLAGS" \
              -o "dist/gohttpserver-${name}"
          }

          build linux   amd64 linux-amd64
          build linux   arm64 linux-arm64
          build darwin  amd64 mac-amd64
          build darwin  arm64 mac-arm64
          build windows amd64 win-amd64.exe
          build windows arm64 win-arm64.exe

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release (CHANGELOG)
        if: steps.ver.outputs.changelog != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          body: ${{ steps.ver.outputs.changelog }}
          files: |
            dist/gohttpserver-linux-amd64
            dist/gohttpserver-linux-arm64
            dist/gohttpserver-mac-amd64
            dist/gohttpserver-mac-arm64
            dist/gohttpserver-win-amd64.exe
            dist/gohttpserver-win-arm64.exe
            dist/checksums.txt

      - name: Create GitHub Release (auto notes fallback)
        if: steps.ver.outputs.changelog == ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            dist/gohttpserver-linux-amd64
            dist/gohttpserver-linux-arm64
            dist/gohttpserver-mac-amd64
            dist/gohttpserver-mac-arm64
            dist/gohttpserver-win-amd64.exe
            dist/gohttpserver-win-arm64.exe
            dist/checksums.txt
